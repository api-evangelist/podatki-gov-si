apis:
  - aid: podatki-gov-si:catalog
    name: OPSI Slovenia CKAN Action API
    description: >-
      CKAN Action API for OPSI Slovenia, a consistent JSON-over-HTTP interface over a catalog of 8,875 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://podatki.gov.si/api/3/action/.
    humanURL: https://podatki.gov.si
