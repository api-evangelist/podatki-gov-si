aid: podatki-gov-si
name: OPSI Slovenia
description: >-
  OPSI Slovenia is a national government open-data portal for Slovenia running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 8,875 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
